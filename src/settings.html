<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FadeNote Settings</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 22px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f3ec;
      color: #333;
    }
    .panel {
      background: #fffdf5;
      border: 1px solid #e8e2d6;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      padding: 20px;
    }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .row { margin: 14px 0; }
    label { display: block; font-size: 13px; color: #6a6257; margin-bottom: 6px; }
    input[type="time"], input[readonly], select {
      width: 100%;
      border: 1px solid #ddd5c7;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 14px;
      padding: 8px 10px;
    }
    input[readonly] {
      background: #f1eee7;
      color: #8a8176;
      cursor: default;
    }
    .switch-row, .weekday-row, .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .weekday-row label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin: 0;
    }
    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 9px 12px;
      font-size: 13px;
    }
    .primary { background: #333; color: #fff; }
    .secondary { background: #eee8dd; color: #4c463f; }
    .status { min-height: 18px; color: #777; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Scheduled Raise</h1>

    <div class="row switch-row">
      <input id="enabled" type="checkbox" />
      <label for="enabled" style="margin:0;">Enable scheduled temporary raise</label>
    </div>

    <div class="row">
      <label for="time">Time</label>
      <input id="time" type="time" value="09:00" />
    </div>

    <div class="row">
      <label for="recurrence">Repeat</label>
      <select id="recurrence">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>

    <div class="row" id="weekdays-row">
      <label>Weekdays</label>
      <div class="weekday-row">
        <label><input type="checkbox" value="1" /> Mon</label>
        <label><input type="checkbox" value="2" /> Tue</label>
        <label><input type="checkbox" value="3" /> Wed</label>
        <label><input type="checkbox" value="4" /> Thu</label>
        <label><input type="checkbox" value="5" /> Fri</label>
        <label><input type="checkbox" value="6" /> Sat</label>
        <label><input type="checkbox" value="7" /> Sun</label>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="save">Save</button>
      <button class="secondary" id="raise-now">Raise Now</button>
    </div>

    <div class="row">
      <label for="save-dir">File save directory</label>
      <input id="save-dir" type="text" readonly value="Loading..." />
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="./settings.js"></script>
</body>
</html>
