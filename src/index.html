<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FadeNote</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Window background (critical base layer) -->
  <div class="window-bg">

    <div class="paper">
      <!-- Title bar: Only draggable here -->
      <div class="paper-header" data-tauri-drag-region>
        <span class="dot red btn-close" id="btn-close" data-tauri-drag-region="false" title="Close" aria-label="Close"></span>
        <span class="dot orange btn-delete" id="btn-delete" data-tauri-drag-region="false" title="Delete" aria-label="Delete"></span>
        <span class="dot green btn-top" id="btn-top" data-tauri-drag-region="false" title="Always on Top" aria-label="Always on Top"></span>
        <span class="dot blue btn-pin" id="btn-pin" data-tauri-drag-region="false" title="Pin" aria-label="Pin"></span>
      </div>

      <div class="editor-toolbar" data-tauri-drag-region="false">
        <button type="button" class="toolbar-btn" data-format="bold" title="Bold (Ctrl+B)">B</button>
        <button type="button" class="toolbar-btn" data-format="list" title="List">
          <img class="toolbar-icon" src="./assets/task.png" alt="" />
        </button>
        <button type="button" class="toolbar-btn" data-format="task" title="Task">
          <img class="toolbar-icon" src="./assets/list.png" alt="" />
        </button>
      </div>

      <!-- Markdown editor: stores markdown, previews supported syntax inline -->
      <div
        class="paper-content markdown-editor"
        data-tauri-drag-region="false"
        spellcheck="false"
      ></div>

      <div class="note-footer" data-tauri-drag-region="false">
        <span id="note-lifecycle-status">Auto archive</span>
        <span id="note-save-status">Saved</span>
      </div>
    </div>

  </div>

  <script src="./main.js"></script>
</body>
</html>
